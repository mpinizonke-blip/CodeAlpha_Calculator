<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeAlpha Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>CodeAlpha Calculator</h1>
    <div class="calculator">
      <input type="text" id="display" placeholder="0" disabled>
      <div class="buttons">
        <button class="btn clear" id="clear">C</button>
        <button class="btn operator">/</button>
        <button class="btn operator">*</button>
        <button class="btn operator">-</button>

        <button class="btn">7</button>
        <button class="btn">8</button>
        <button class="btn">9</button>
        <button class="btn operator">+</button>

        <button class="btn">4</button>
        <button class="btn">5</button>
        <button class="btn">6</button>
        <button class="btn span-2" id="equals">=</button>

        <button class="btn">1</button>
        <button class="btn">2</button>
        <button class="btn">3</button>

        <button class="btn span-3">0</button>
        <button class="btn">.</button>
        <p>Done by Zonke Mpini</p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
